<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AESIVO | Cart</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* =========================================
BASE
========================================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#f5f0ea;
color:#111;
overflow-x:hidden;
}

a{
text-decoration:none;
color:inherit;
}

button{
border:none;
outline:none;
cursor:pointer;
font-family:'Poppins',sans-serif;
}

/* =========================================
HEADER
========================================= */

.header{
position:sticky;
top:0;
z-index:999;
background:#050505;
border-bottom:1px solid rgba(255,255,255,.06);
}

.nav-container{
max-width:1450px;
margin:auto;
padding:22px 5%;

display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
font-size:2rem;
font-family:'Playfair Display',serif;
letter-spacing:.18em;
color:#f5f0ea;
}

.nav-menu{
display:flex;
gap:40px;
}

.nav-menu a,
.nav-actions a{
font-size:.82rem;
text-transform:uppercase;
letter-spacing:.14em;
color:rgba(255,255,255,.72);
transition:.3s ease;
}

.nav-menu a:hover,
.nav-actions a:hover{
color:#d8c2a8;
}

.nav-actions{
display:flex;
gap:26px;
}

/* =========================================
PAGE TITLE
========================================= */

.page-hero{
background:#050505;
padding:70px 5%;
text-align:center;
}

.page-subtitle{
font-size:.7rem;
letter-spacing:.3em;
text-transform:uppercase;
color:#d8c2a8;
margin-bottom:16px;
}

.page-title{
font-size:4rem;
font-family:'Playfair Display',serif;
color:white;
}

/* =========================================
LAYOUT
========================================= */

.cart-wrapper{
max-width:1450px;
margin:auto;
padding:60px 5% 100px;

display:grid;
grid-template-columns:1fr 420px;
gap:40px;
align-items:start;
}

/* =========================================
CART ITEMS
========================================= */

.cart-items{
display:flex;
flex-direction:column;
gap:24px;
}

.cart-item{
background:white;

border-radius:28px;

padding:24px;

display:flex;
gap:24px;
align-items:center;

box-shadow:
0 10px 35px rgba(0,0,0,.06);

transition:.35s ease;
}

.cart-item:hover{
transform:translateY(-4px);
}

.cart-image{
width:140px;
height:170px;

border-radius:22px;

overflow:hidden;

background:#eee;

flex-shrink:0;
}

.cart-image img{
width:100%;
height:100%;
object-fit:cover;
}

.cart-body{
flex:1;
}

.item-brand{
font-size:.7rem;
letter-spacing:.18em;
text-transform:uppercase;
color:#777;
margin-bottom:8px;
}

.item-name{
font-size:1.35rem;
font-family:'Playfair Display',serif;
margin-bottom:10px;
}

.item-meta{
font-size:.9rem;
color:#777;
margin-bottom:18px;
}

/* =========================================
QUANTITY
========================================= */

.qty-box{
display:inline-flex;
align-items:center;

border:1px solid rgba(0,0,0,.1);

border-radius:14px;

overflow:hidden;
}

.qty-btn{
width:44px;
height:44px;

background:#f7f3ee;

font-size:1.1rem;
}

.qty-btn:hover{
background:#111;
color:white;
}

.qty-number{
width:50px;
text-align:center;
font-weight:600;
}

/* =========================================
PRICE
========================================= */

.item-price-wrap{
text-align:right;
}

.item-price{
font-size:1.6rem;
font-weight:600;
margin-bottom:10px;
}

.remove-btn{
background:none;
color:#999;
font-size:.82rem;
text-transform:uppercase;
letter-spacing:.08em;
}

.remove-btn:hover{
color:#c0392b;
}

/* =========================================
SUMMARY
========================================= */

.cart-summary{
background:white;

padding:35px;

border-radius:28px;

position:sticky;
top:110px;

box-shadow:
0 10px 35px rgba(0,0,0,.06);
}

.summary-title{
font-size:2rem;
font-family:'Playfair Display',serif;
margin-bottom:30px;
}

.summary-row{
display:flex;
justify-content:space-between;
padding:16px 0;

border-bottom:1px solid rgba(0,0,0,.08);

font-size:.95rem;
}

.summary-total{
display:flex;
justify-content:space-between;

padding:28px 0;

font-size:1.5rem;
font-weight:600;
}

.summary-total span:last-child{
font-family:'Playfair Display',serif;
}

.checkout-btn{
width:100%;
height:62px;

border-radius:16px;

background:#111;
color:white;

font-size:.88rem;
font-weight:600;

letter-spacing:.12em;
text-transform:uppercase;

transition:.35s ease;
}

.checkout-btn:hover{
background:#222;
transform:translateY(-2px);
}

.continue-btn{
width:100%;
height:58px;

border-radius:16px;

margin-top:14px;

background:transparent;

border:1px solid rgba(0,0,0,.12);

font-size:.85rem;
font-weight:500;
}

.continue-btn:hover{
background:#111;
color:white;
}

/* =========================================
EMPTY CART
========================================= */

.empty-cart{
background:white;

padding:90px 40px;

border-radius:30px;

text-align:center;
}

.empty-cart h2{
font-size:2.5rem;
font-family:'Playfair Display',serif;
margin-bottom:18px;
}

.empty-cart p{
color:#777;
margin-bottom:35px;
}

.shop-btn{
display:inline-flex;
align-items:center;
justify-content:center;

padding:16px 34px;

border-radius:14px;

background:#111;
color:white;

font-size:.82rem;
font-weight:600;

letter-spacing:.12em;
text-transform:uppercase;
}

/* =========================================
FOOTER
========================================= */

footer{
background:#050505;
padding:80px 5% 40px;
color:white;
}

.footer-container{
max-width:1400px;
margin:auto;

display:grid;
grid-template-columns:repeat(2,1fr);

gap:40px;
}

.footer-container h3{
margin-bottom:20px;
}

.footer-container a{
display:block;
margin-bottom:12px;
color:#aaa;
}

.footer-container a:hover{
color:#d8c2a8;
}

.copyright{
text-align:center;
margin-top:50px;
color:#777;
font-size:.82rem;
}

/* =========================================
RESPONSIVE
========================================= */

@media(max-width:1100px){

.cart-wrapper{
grid-template-columns:1fr;
}

.cart-summary{
position:relative;
top:auto;
}

}

@media(max-width:768px){

.page-title{
font-size:2.7rem;
}

.cart-item{
flex-direction:column;
align-items:flex-start;
}

.cart-image{
width:100%;
height:360px;
}

.item-price-wrap{
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
}

}

</style>

</head>

<body>

<!-- =========================================
HEADER
========================================= -->

<header class="header">

<div class="nav-container">

<div class="logo">
AESIVO
</div>

<nav class="nav-menu">

<a href="/">Home</a>
<a href="/collection">Collection</a>
<a href="/men">Men</a>
<a href="/women">Women</a>
<a href="/about">About</a>

</nav>

<div class="nav-actions">

<a href="/account">Account</a>
<a href="/cart">Cart</a>

</div>

</div>

</header>

<!-- =========================================
PAGE HERO
========================================= -->

<section class="page-hero">

<div class="page-subtitle">
AESIVO LUXURY
</div>

<h1 class="page-title">
Your Cart
</h1>

</section>

<!-- =========================================
CART
========================================= -->

<section class="cart-wrapper">

<div
class="cart-items"
id="cartItems"
>

</div>

<div class="cart-summary">

<h2 class="summary-title">
Order Summary
</h2>

<div class="summary-row">
<span>Subtotal</span>
<span id="subtotal">₹0</span>
</div>

<div class="summary-row">
<span>Shipping</span>
<span style="color:#0d7a36;">
Free
</span>
</div>

<div class="summary-row">
<span>Taxes</span>
<span>Included</span>
</div>

<div class="summary-total">
<span>Total</span>
<span id="total">₹0</span>
</div>

<button
class="checkout-btn"
onclick="goCheckout()"
>
Proceed To Checkout
</button>

<button
class="continue-btn"
onclick="window.location.href='/collection'"
>
Continue Shopping
</button>

</div>

</section>

<!-- =========================================
FOOTER
========================================= -->

<footer>

<div class="footer-container">

<div>

<h3>
Company
</h3>

<a href="/about">About</a>
<a href="/contact">Contact</a>

</div>

<div>

<h3>
Account
</h3>

<a href="/account">My Account</a>
<a href="/orders">Orders</a>

</div>

</div>

<p class="copyright">
© 2026 AESIVO. All rights reserved.
</p>

</footer>

<!-- =========================================
SCRIPT
========================================= -->

<script>

const token =
localStorage.getItem("token");

/* =========================================
LOAD CART
========================================= */

async function loadCart(){

const container =
document.getElementById(
"cartItems"
);

if(!token){

container.innerHTML = `

<div class="empty-cart">

<h2>
Login Required
</h2>

<p>
Please login to view your cart
and continue shopping.
</p>

<a
href="/account"
class="shop-btn"
>
Login
</a>

</div>

`;

return;

}

try{

const res =
await fetch("/api/cart/",{

headers:{
"Authorization":
`Bearer ${token}`
}

});

const items =
await res.json();

if(!items.length){

container.innerHTML = `

<div class="empty-cart">

<h2>
Your Cart Is Empty
</h2>

<p>
Discover premium fashion pieces
from AESIVO luxury collections.
</p>

<a
href="/collection"
class="shop-btn"
>
Explore Collection
</a>

</div>

`;

document.getElementById(
"subtotal"
).innerText = "₹0";

document.getElementById(
"total"
).innerText = "₹0";

return;

}

renderCart(items);

}

catch(err){

console.error(err);

}

}

/* =========================================
RENDER CART
========================================= */

function renderCart(items){

const container =
document.getElementById(
"cartItems"
);

let total = 0;

container.innerHTML =
items.map(item => {

const lineTotal =
item.price * item.quantity;

total += lineTotal;

return `

<div class="cart-item">

<div class="cart-image">

<img
src="${item.image}"
alt="${item.name}"

onerror="
this.src='/static/images/placeholder.jpg'
"
>

</div>

<div class="cart-body">

<div class="item-brand">
AESIVO LUXURY
</div>

<h2 class="item-name">
${item.name}
</h2>

<div class="item-meta">
Premium Luxury Fashion
</div>

<div class="qty-box">

<button
class="qty-btn"
onclick="changeQty(${item.id},${item.quantity-1})"
>
−
</button>

<div class="qty-number">
${item.quantity}
</div>

<button
class="qty-btn"
onclick="changeQty(${item.id},${item.quantity+1})"
>
+
</button>

</div>

</div>

<div class="item-price-wrap">

<div class="item-price">
₹${lineTotal}
</div>

<button
class="remove-btn"
onclick="removeItem(${item.id})"
>
Remove
</button>

</div>

</div>

`;

}).join('');

document.getElementById(
"subtotal"
).innerText = `₹${total}`;

document.getElementById(
"total"
).innerText = `₹${total}`;

}

/* =========================================
CHANGE QUANTITY
========================================= */

async function changeQty(id,qty){

if(qty < 1) return;

await fetch(
`/api/cart/update/${id}`,{

method:"PUT",

headers:{
"Content-Type":"application/json",
"Authorization":
`Bearer ${token}`
},

body:JSON.stringify({
quantity:qty
})

});

loadCart();

}

/* =========================================
REMOVE ITEM
========================================= */

async function removeItem(id){

await fetch(
`/api/cart/remove/${id}`,{

method:"DELETE",

headers:{
"Authorization":
`Bearer ${token}`
}

});

loadCart();

}

/* =========================================
CHECKOUT
========================================= */

function goCheckout(){

if(!token){

alert("Please login first");

window.location.href =
"/account";

return;

}

window.location.href =
"/checkout";

}

/* =========================================
INIT
========================================= */

loadCart();

</script>

</body>
</html>
