<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
AESIVO | AI Virtual Try-On
</title>

<link
href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap"
rel="stylesheet"
/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#0b0b0b;
color:white;
overflow:hidden;
}

/* HEADER */

.header{
height:80px;
background:#000;
border-bottom:1px solid rgba(255,255,255,.08);

display:flex;
align-items:center;
justify-content:space-between;

padding:0 50px;

position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
}

.logo{
font-family:'Playfair Display',serif;
font-size:2rem;
letter-spacing:.15em;
color:#d8c2a8;
text-decoration:none;
}

.nav{
display:flex;
gap:35px;
}

.nav a{
text-decoration:none;
color:white;
font-size:.9rem;
letter-spacing:.08em;
transition:.3s;
}

.nav a:hover{
color:#d8c2a8;
}

/* MAIN */

.main{
display:flex;
height:100vh;
padding-top:80px;
}

/* SIDEBAR */

.sidebar{
width:360px;
background:#111;

border-right:1px solid rgba(255,255,255,.08);

display:flex;
flex-direction:column;

overflow:hidden;
}

/* TITLE */

.tryon-title{
padding:30px 25px 20px;
border-bottom:1px solid rgba(255,255,255,.08);
}

.tryon-title h2{
font-size:1.8rem;
font-family:'Playfair Display',serif;
margin-bottom:10px;
}

.tryon-title p{
font-size:.85rem;
color:rgba(255,255,255,.55);
line-height:1.7;
}

/* MODE BUTTONS */

.mode-buttons{
display:flex;
gap:12px;
padding:20px 25px;
}

.mode-btn{
flex:1;

height:52px;

border:none;
border-radius:14px;

background:#1a1a1a;
color:white;

font-size:.9rem;
font-weight:500;

cursor:pointer;

transition:.3s;
}

.mode-btn.active{
background:#d8c2a8;
color:black;
}

.mode-btn:hover{
transform:translateY(-2px);
}

/* UPLOAD */

.upload-section{
padding:0 25px 20px;
}

.upload-btn{
width:100%;
height:55px;

border:2px dashed rgba(216,194,168,.35);

background:rgba(216,194,168,.05);

border-radius:16px;

color:#d8c2a8;

font-size:.9rem;
font-weight:500;

cursor:pointer;
transition:.3s;
}

.upload-btn:hover{
background:rgba(216,194,168,.12);
}

#fileInput{
display:none;
}

/* CONTROLS */

.controls{
padding:0 25px 25px;
border-bottom:1px solid rgba(255,255,255,.08);
}

.control-group{
margin-bottom:18px;
}

.control-label{
display:flex;
justify-content:space-between;

margin-bottom:10px;

font-size:.82rem;
color:rgba(255,255,255,.7);
}

.control-slider{
width:100%;
height:5px;
appearance:none;

background:#2a2a2a;
border-radius:10px;
}

.control-slider::-webkit-slider-thumb{
appearance:none;

width:18px;
height:18px;

border-radius:50%;

background:#d8c2a8;
cursor:pointer;
}

/* SEARCH */

.search-wrap{
padding:20px 25px;
}

.search-input{
width:100%;
height:52px;

background:#1b1b1b;
border:none;

border-radius:14px;

padding:0 18px;

color:white;
font-size:.9rem;
}

.search-input:focus{
outline:none;
border:1px solid #d8c2a8;
}
<style>

/* PRODUCT LIST */

.product-list{
flex:1;
overflow-y:auto;
padding:0 20px 30px;
}

.product-card{
display:flex;
gap:15px;

background:#171717;

border-radius:18px;

padding:12px;

margin-bottom:15px;

cursor:pointer;

transition:.3s;
border:1px solid transparent;
}

.product-card:hover{
transform:translateY(-4px);
border-color:#d8c2a8;
}

.product-card.active{
border-color:#d8c2a8;
background:#1d1b18;
}

.product-image{
width:80px;
height:100px;

border-radius:14px;
overflow:hidden;

background:#222;

flex-shrink:0;
}

.product-image img{
width:100%;
height:100%;
object-fit:cover;
}

.product-info{
flex:1;
}

.product-name{
font-size:.95rem;
font-weight:500;
margin-bottom:8px;
line-height:1.5;
}

.product-price{
font-size:1rem;
font-weight:600;
color:#d8c2a8;
}

/* CANVAS SECTION */

.canvas-section{
flex:1;
position:relative;

background:
linear-gradient(
135deg,
#0d0d0d,
#151515
);

display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* GRID */

.canvas-section::before{
content:'';
position:absolute;
inset:0;

background-image:
linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);

background-size:40px 40px;
}

/* EMPTY */

.empty-state{
position:absolute;
text-align:center;
z-index:1;
}

.empty-state h2{
font-family:'Playfair Display',serif;
font-size:3rem;
margin-bottom:15px;
}

.empty-state p{
color:rgba(255,255,255,.55);
font-size:1rem;
}

/* CANVAS */

.canvas-wrap{
position:relative;
z-index:5;

display:none;

border-radius:28px;
overflow:hidden;

box-shadow:
0 30px 100px rgba(0,0,0,.6);
}

.canvas-wrap.visible{
display:block;
}

#tryonCanvas{
display:block;

max-width:90vw;
max-height:85vh;

background:black;
}

/* TOOLBAR */

.toolbar{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);

display:flex;
gap:15px;

background:rgba(0,0,0,.75);

backdrop-filter:blur(15px);

padding:12px 18px;

border-radius:100px;

z-index:20;
}

.tool-btn{
width:52px;
height:52px;

border:none;
border-radius:50%;

background:#1c1c1c;
color:white;

font-size:1.1rem;

cursor:pointer;

transition:.3s;
}

.tool-btn:hover{
background:#d8c2a8;
color:black;
transform:translateY(-3px);
}

.tool-btn.primary{
background:#d8c2a8;
color:black;
}

/* TOAST */

.toast{
position:fixed;

top:100px;
right:30px;

background:#171717;
border:1px solid rgba(216,194,168,.3);

padding:16px 22px;

border-radius:16px;

font-size:.9rem;

transform:translateX(120%);
transition:.4s;

z-index:9999;
}

.toast.show{
transform:translateX(0);
}

#cameraVideo{

position:absolute;

opacity:0;

pointer-events:none;

width:1px;
height:1px;

}
#tryonCanvas{
background:#111;
border-radius:28px;
}
</style>
</head>

<body>

<div class="toast" id="toast">
Done
</div>

<header class="header">

<a href="/" class="logo">
AESIVO
</a>

<div class="nav">

<a href="/">Home</a>
<a href="/collection">Collection</a>
<a href="/men">Men</a>
<a href="/women">Women</a>
<a href="/cart">Cart</a>

</div>

</header>

<div class="main">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="tryon-title">

<h2>
Virtual Try-On
</h2>

<p>
Experience AI-powered fashion preview with live camera and smart fitting.
</p>

</div>
<div class="mode-buttons">

<button
class="mode-btn active"
id="cameraBtn"
onclick="setMode('camera')"
>
📷 Camera
</button>

<button
class="mode-btn"
id="photoBtn"
onclick="setMode('photo')"
>
🖼 Photo
</button>

</div>

<div class="upload-section">

<button
class="upload-btn"
onclick="document.getElementById('fileInput').click()"
>
Upload Your Photo
</button>

<input
type="file"
id="fileInput"
accept="image/*"
/>

</div>

<div class="controls">

<div class="control-group">

<div class="control-label">
<span>Opacity</span>
<span id="opacityValue">92%</span>
</div>

<input
type="range"
min="0.2"
max="1"
step="0.05"
value="0.92"
class="control-slider"
id="opacitySlider"
/>

</div>

<div class="control-group">

<div class="control-label">
<span>Scale</span>
<span id="scaleValue">1x</span>
</div>

<input
type="range"
min="0.5"
max="2"
step="0.05"
value="1"
class="control-slider"
id="scaleSlider"
/>

</div>

</div>

<div class="search-wrap">

<input
type="text"
class="search-input"
placeholder="Search products..."
id="searchInput"
/>

</div>

<div
class="product-list"
id="productList"
>

</div>

</div>

<!-- CANVAS -->

<div class="canvas-section">

<div
class="empty-state"
id="emptyState"
>

<h2>
AI Try-On
</h2>

<p>
Use camera or upload image to begin
</p>

</div>

<video
id="cameraVideo"
autoplay
playsinline
muted
style="display:none;"
></video>

<div
class="canvas-wrap"
id="canvasWrap"
>

<canvas id="tryonCanvas"></canvas>

</div>

<div class="toolbar">

<button
class="tool-btn"
onclick="captureImage()"
>
📸
</button>

<button
class="tool-btn"
onclick="resetTryon()"
>
♻️
</button>

<button
class="tool-btn primary"
onclick="addToCart()"
>
🛒
</button>

</div>

</div>

</div>
<script>

const canvas =
document.getElementById('tryonCanvas');

const ctx =
canvas.getContext('2d');

const video =
document.getElementById('cameraVideo');

let products = [];
let selectedProduct = null;

let clothImage = null;
let uploadedImage = null;

let opacity = 0.92;
let scale = 1;

function showToast(msg){

const toast =
document.getElementById('toast');

toast.innerText = msg;

toast.classList.add('show');

setTimeout(()=>{
toast.classList.remove('show');
},2500);

}

/* LOAD PRODUCTS */

async function loadProducts(){

try{

const res =
await fetch('/api/products');

const data =
await res.json();

products =
data.products || data;

renderProducts(products);

}

catch(err){

console.error(err);

}

}
function renderCamera(){

if(video.readyState === 4){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

ctx.drawImage(
video,
0,
0,
canvas.width,
canvas.height
);

drawCloth();

}

requestAnimationFrame(renderCamera);

}

function renderProducts(items){

const container =
document.getElementById('productList');

container.innerHTML = '';

items.forEach(product=>{

const card =
document.createElement('div');

card.className =
'product-card';

card.innerHTML = `

<div class="product-image">
<img src="${product.image}">
</div>

<div class="product-info">

<div class="product-name">
${product.name}
</div>

<div class="product-price">
₹${product.price}
</div>

</div>

`;

card.onclick = ()=>{

document
.querySelectorAll('.product-card')
.forEach(c=>c.classList.remove('active'));

card.classList.add('active');

selectProduct(product);

};

container.appendChild(card);

});

}
function selectProduct(product){

selectedProduct = product;

clothImage = new Image();

clothImage.onload = ()=>{

console.log(
'cloth loaded'
);

drawCanvas();

showToast(
product.name + ' selected'
);

};

clothImage.src =
product.image;

}

async function startCamera(){

try{

const stream =
await navigator.mediaDevices.getUserMedia({
video:{
width:1280,
height:720,
facingMode:"user"
},
audio:false
});

video.srcObject = stream;

video.style.display = 'block';

video.onloadedmetadata = ()=>{

video.play();

canvas.width =
video.videoWidth || 1280;

canvas.height =
video.videoHeight || 720;

document
.getElementById('canvasWrap')
.classList.add('visible');

document
.getElementById('emptyState')
.style.display='none';

renderCamera();

showToast(
'Camera Connected'
);

};

}

catch(err){

console.error(err);

alert(
'Unable to access camera'
);

}
}

function drawCanvas(){

if(!uploadedImage) return;

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

ctx.drawImage(
uploadedImage,
0,
0,
canvas.width,
canvas.height
);

drawCloth();

}

function drawCloth(){

if(!clothImage) return;

/* BODY POSITION */

const clothWidth =
canvas.width * 0.42 * scale;

const clothHeight =
clothWidth * 1.25;

/* CENTER ON TORSO */

const x =
(canvas.width / 2) - (clothWidth / 2);

const y =
(canvas.height / 2) - (clothHeight / 2.2);

ctx.globalAlpha = opacity;

ctx.drawImage(
clothImage,
x,
y,
clothWidth,
clothHeight
);

ctx.globalAlpha = 1;

}
document
.getElementById('fileInput')
.addEventListener(
'change',
function(e){

const file =
e.target.files[0];

if(!file) return;

const reader =
new FileReader();

reader.onload = function(ev){

uploadedImage =
new Image();

uploadedImage.onload = ()=>{

canvas.width =
uploadedImage.width;

canvas.height =
uploadedImage.height;

document
.getElementById('canvasWrap')
.classList.add('visible');

document
.getElementById('emptyState')
.style.display='none';

drawCanvas();

};

uploadedImage.src =
ev.target.result;

};

reader.readAsDataURL(file);

});

document
.getElementById('opacitySlider')
.addEventListener(
'input',
function(){

opacity =
parseFloat(this.value);

document
.getElementById('opacityValue')
.innerText =
Math.round(opacity*100)+'%';

drawCanvas();

}
);

document
.getElementById('scaleSlider')
.addEventListener(
'input',
function(){

scale =
parseFloat(this.value);

document
.getElementById('scaleValue')
.innerText =
scale+'x';

drawCanvas();

}
);

function setMode(mode){

document
.getElementById('cameraBtn')
.classList.remove('active');

document
.getElementById('photoBtn')
.classList.remove('active');

if(mode==='camera'){

document
.getElementById('cameraBtn')
.classList.add('active');

startCamera();

}

else{

document
.getElementById('photoBtn')
.classList.add('active');

}

}

function captureImage(){

const link =
document.createElement('a');

link.download =
'aesivo-tryon.png';

link.href =
canvas.toDataURL();

link.click();

showToast('Screenshot Saved');

}

function resetTryon(){

scale = 1;
opacity = .92;

document
.getElementById('scaleSlider')
.value = 1;

document
.getElementById('opacitySlider')
.value = .92;

drawCanvas();

showToast('Reset Complete');

}

async function addToCart(){

if(!selectedProduct){

showToast(
'Select a product first'
);

return;

}

try{

await fetch(
'/api/cart/add',
{
method:'POST',
headers:{
'Content-Type':
'application/json'
},
body:JSON.stringify({
product_id:selectedProduct.id,
quantity:1
})
}
);

showToast(
'Added to Cart'
);

}

catch(err){

showToast(
'Cart failed'
);

}

}

document
.getElementById('searchInput')
.addEventListener(
'input',
function(){

const value =
this.value.toLowerCase();

const filtered =
products.filter(p=>
p.name.toLowerCase().includes(value)
);

renderProducts(filtered);

}
);

loadProducts();

startCamera();

</script>

</body>
</html>
