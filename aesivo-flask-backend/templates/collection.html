<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AESIVO | Collection</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#f5f1ea;
  color:#111;
  font-family:'Poppins',sans-serif;
}

/* =========================
HEADER
========================= */

.header{
  background:#000;
  padding:25px 8%;
  position:sticky;
  top:0;
  z-index:1000;
}

.nav-container{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  color:white;
  font-size:50px;
  font-family:'Playfair Display',serif;
}

.nav-menu,
.nav-actions{
  display:flex;
  gap:40px;
}

.nav-menu a,
.nav-actions a{
  color:white;
  text-decoration:none;
  font-size:17px;
  transition:0.3s;
}

.nav-menu a:hover,
.nav-actions a:hover{
  opacity:0.7;
}

/* =========================
HERO
========================= */

.collection-hero{
  padding:100px 8% 70px;
  text-align:center;
}

.collection-hero h1{
  font-size:70px;
  margin-bottom:20px;
  font-family:'Playfair Display',serif;
}

.collection-hero p{
  color:#666;
  font-size:18px;
}

/* =========================
TOP BAR
========================= */

.top-bar{
  padding:0 8% 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

.search-box{
  flex:1;
  min-width:280px;
}

.search-box input{
  width:100%;
  padding:16px 20px;
  border-radius:16px;
  border:none;
  outline:none;
  background:white;
  font-size:15px;
  box-shadow:0 8px 30px rgba(0,0,0,0.06);
}

.filter-bar{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.filter-btn{
  padding:14px 24px;
  border:none;
  border-radius:14px;
  background:white;
  cursor:pointer;
  transition:0.3s;
  font-weight:500;
  box-shadow:0 8px 30px rgba(0,0,0,0.06);
}

.filter-btn.active{
  background:black;
  color:white;
}

/* =========================
PRODUCTS
========================= */

.products{
  padding:0 8% 100px;
}

.product-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
}

.product-card{
  background:white;
  border-radius:28px;
  overflow:hidden;
  text-decoration:none;
  color:#111;
  transition:0.4s;
  box-shadow:0 10px 40px rgba(0,0,0,0.06);
  position:relative;
}

.product-card:hover{
  transform:translateY(-8px);
}

.product-image-box{
  width:100%;
  height:360px;
  background:#f8f8f8;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.product-image{
  width:100%;
  height:100%;
  object-fit:contain;
  padding:20px;
  transition:0.4s;
}

.product-card:hover .product-image{
  transform:scale(1.05);
}

.product-content{
  padding:24px;
}

.product-brand{
  color:#777;
  font-size:14px;
  margin-bottom:10px;
}

.product-name{
  font-size:22px;
  margin-bottom:15px;
  font-family:'Playfair Display',serif;
}

.price-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.product-price{
  font-size:24px;
  font-weight:600;
}

.product-rating{
  background:black;
  color:white;
  padding:6px 12px;
  border-radius:30px;
  font-size:13px;
}

.stock-badge{
  position:absolute;
  top:18px;
  left:18px;
  background:#111;
  color:white;
  padding:8px 14px;
  border-radius:30px;
  font-size:12px;
}

/* =========================
LOADER
========================= */

.loader{
  text-align:center;
  padding:80px;
  font-size:18px;
  color:#666;
}

/* =========================
EMPTY
========================= */

.empty{
  text-align:center;
  padding:100px;
  background:white;
  border-radius:30px;
}

/* =========================
FOOTER
========================= */

footer{
  background:#000;
  padding:70px 8% 40px;
  color:white;
}

.footer-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:40px;
  margin-bottom:40px;
}

.footer-container h3{
  margin-bottom:20px;
}

.footer-container a{
  display:block;
  margin-bottom:12px;
  color:#ccc;
  text-decoration:none;
}

.copyright{
  text-align:center;
  color:#888;
}

/* =========================
RESPONSIVE
========================= */

@media(max-width:900px){

.logo{
  font-size:36px;
}

.nav-menu{
  display:none;
}

.collection-hero h1{
  font-size:48px;
}

.top-bar{
  flex-direction:column;
  align-items:stretch;
}

}

</style>

</head>

<body>

<!-- =========================
HEADER
========================= -->

<header class="header">

<div class="nav-container">

<div class="logo">AESIVO</div>

<nav class="nav-menu">
<a href="/">Home</a>
<a href="/collection">Collection</a>
<a href="/about">About</a>
<a href="/contact">Contact</a>
</nav>

<div class="nav-actions">
<a href="/account">Account</a>
<a href="/cart">Cart</a>
</div>

</div>

</header>


<!-- =========================
HERO
========================= -->

<section class="collection-hero">

<h1>Luxury Collection</h1>

<p>
Curated premium fashion crafted for modern elegance.
</p>

</section>


<!-- =========================
TOP BAR
========================= -->

<div class="top-bar">

<div class="search-box">
<input
type="text"
placeholder="Search premium fashion..."
id="searchInput"
onkeyup="searchProducts()"
>
</div>

<div class="filter-bar">

<button
class="filter-btn active"
onclick="window.location.href='/collection'">
All
</button>

<button
class="filter-btn"
onclick="window.location.href='/men'">
Men
</button>

<button
class="filter-btn"
onclick="window.location.href='/women'">
Women
</button>

</div>
</div>

</div>


<!-- =========================
PRODUCTS
========================= -->

<section class="products">

<div class="product-grid" id="productGrid">

<div class="loader">
Loading Collection...
</div>

</div>

</section>


<!-- =========================
FOOTER
========================= -->

<footer>

<div class="footer-container">

<div>
<h3>Company</h3>
<a href="/about">About</a>
<a href="/contact">Contact</a>
</div>

<div>
<h3>Account</h3>
<a href="/account">My Account</a>
<a href="/orders">Orders</a>
<a href="/cart">Cart</a>
</div>

</div>

<p class="copyright">
© 2026 AESIVO. All rights reserved.
</p>

</footer>


<!-- =========================
SCRIPT
========================= -->

<script>

const API = "/api/products/";

async function loadProducts(){

  try{

    const res = await fetch(API);

    const products = await res.json();

    renderProducts(products);

  }

  catch(err){

    console.error(err);

    document.getElementById("productGrid").innerHTML = `
      <p style="
      text-align:center;
      width:100%;
      color:#777;
      ">
      Failed to load products
      </p>
    `;

  }

}

function renderProducts(products){

  const grid =
  document.getElementById("productGrid");

  if(!products.length){

    grid.innerHTML = `
      <p>No products found</p>
    `;

    return;

  }

  grid.innerHTML = products.map(p => `

    <a
    href="/product?id=${p.id}"
    class="product-card"
    >

      <div class="product-image">

        <img
        src="${p.image}"
        alt="${p.name}"

        onerror="
        this.src='/static/images/placeholder.jpg'
        "
        >

      </div>
      

      <div class="product-info">

        <h3>${p.name}</h3>
         <div class="product-category">
          ${p.category}
        </div>

        <div class="product-bottom">
        <p class="price">
          ₹${p.price}
        </p>

      </div>

    </a>

  `).join('');

}

loadProducts();

</script>
</body>
</html>
